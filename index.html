<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lista della Spesa — Matteo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --border: #E2DDD4;
    --border2: #CCC8BE;
    --text: #1A1814;
    --text2: #6B6760;
    --text3: #A09C96;
    --green: #1D9E75;
    --green-bg: #E1F5EE;
    --green-text: #0F6E56;
    --amber: #BA7517;
    --amber-bg: #FAEEDA;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 120px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 0;
    position: sticky; top: 0; z-index: 100;
  }

  .header-top {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
  }

  .header-title h1 { font-size: 19px; font-weight: 600; letter-spacing: -0.3px; }
  .header-title p { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }

  .spesa-btn {
    background: var(--text); color: white; border: none;
    border-radius: var(--radius-sm); padding: 9px 16px;
    font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer;
  }

  .top-tabs {
    display: flex; overflow-x: auto; scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .top-tabs::-webkit-scrollbar { display: none; }

  .top-tab {
    flex-shrink: 0;
    padding: 10px 16px 12px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; background: none; color: var(--text3);
    border-bottom: 2.5px solid transparent; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif; white-space: nowrap; margin-bottom: -1px;
  }
  .top-tab.active { color: var(--text); border-bottom-color: var(--text); }

  .day-tabs { display: flex; padding-top: 2px; }
  .tab {
    flex: 1; padding: 8px 0 10px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; background: none; color: var(--text3);
    border-bottom: 2px solid transparent; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif; text-align: center;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  #day-selector { border-top: 1px solid var(--border); }

  .container { padding: 14px 14px 0; max-width: 600px; margin: 0 auto; }

  .progress-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .progress-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; background: var(--green); }
  .progress-fill.amber { background: var(--amber); }
  .progress-label { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text2); white-space: nowrap; }
  .reset-link {
    font-size: 12px; color: var(--text3); cursor: pointer;
    text-decoration: underline; text-decoration-color: var(--border2);
    white-space: nowrap; background: none; border: none; font-family: 'DM Sans', sans-serif;
  }

  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .section-header {
    padding: 9px 14px 8px; background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text2); }
  .section-count { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); }

  .item-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s; user-select: none;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:active { background: var(--surface2); }
  .item-row.has-stock { opacity: 0.45; }

  .check {
    width: 22px; height: 22px; border-radius: 5px;
    border: 1.5px solid var(--border2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: white; margin-top: 1px;
  }
  .check.done { background: var(--green); border-color: var(--green); }
  .check.stock { background: var(--amber); border-color: var(--amber); }

  .checkmark {
    display: none; width: 5px; height: 9px;
    border: 2px solid white; border-top: none; border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }
  .check.done .checkmark, .check.stock .checkmark { display: block; }

  .item-content { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; color: var(--text); line-height: 1.35; transition: color 0.15s; }
  .item-name.done { color: var(--text3); text-decoration: line-through; text-decoration-color: var(--border2); }
  .item-alt { font-size: 12px; color: var(--text3); margin-top: 3px; font-style: italic; line-height: 1.3; }
  .days-badge { font-size: 10px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; }

  .qty {
    font-size: 12px; font-family: 'DM Mono', monospace;
    color: var(--text2); white-space: nowrap;
    background: var(--surface2); padding: 3px 8px;
    border-radius: 4px; flex-shrink: 0; margin-top: 2px;
  }
  .qty.multi { background: var(--amber-bg); color: var(--amber); }

  /* SCORTE */
  .scorte-legend {
    display: flex; gap: 10px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px;
    font-size: 12px; color: var(--text2);
  }
  .legend-dot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 2px; margin-right: 5px; vertical-align: middle;
  }
  .dot-green { background: var(--green); }
  .dot-amber { background: var(--amber); }

  .scorte-actions {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .action-btn {
    flex: 1; padding: 11px 10px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; border: 1px solid var(--border); background: var(--surface);
    color: var(--text2); transition: background 0.1s;
  }
  .action-btn.primary {
    background: var(--text); color: white; border-color: var(--text);
  }
  .action-btn:active { opacity: 0.8; }

  /* LISTA MANCANTI */
  .mancanti-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
  }
  .mancanti-title { font-size: 16px; font-weight: 600; }
  .mancanti-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .back-btn {
    padding: 8px 14px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; border: 1px solid var(--border); background: var(--surface);
    color: var(--text2);
  }

  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text3); font-size: 14px; line-height: 1.6;
  }
  .empty-state .big { font-size: 32px; margin-bottom: 10px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 18px 18px 0 0;
    width: 100%; max-width: 600px;
    padding: 20px 18px 40px;
    animation: slideUp 0.22s ease;
    max-height: 85vh; overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
  .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .modal > p { font-size: 13px; color: var(--text2); margin-bottom: 18px; }
  .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .euro-input-wrap { flex: 1; position: relative; }
  .euro-input-wrap span {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 16px; color: var(--text2); font-family: 'DM Mono', monospace;
  }
  .euro-input {
    width: 100%; padding: 13px 12px 13px 30px;
    font-size: 22px; font-family: 'DM Mono', monospace; font-weight: 500;
    border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text); outline: none;
  }
  .euro-input:focus { border-color: var(--text); }
  .save-btn {
    background: var(--text); color: white; border: none;
    border-radius: var(--radius-sm); padding: 13px 20px;
    font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer;
  }
  .storico-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px; }
  .storico-list { list-style: none; }
  .storico-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .storico-item:last-child { border-bottom: none; }
  .storico-meta { display: flex; flex-direction: column; gap: 2px; }
  .storico-day { font-size: 14px; font-weight: 500; }
  .storico-date { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); }
  .storico-amount { font-size: 17px; font-family: 'DM Mono', monospace; font-weight: 500; color: var(--green-text); }
  .storico-del { background: none; border: none; color: var(--text3); font-size: 22px; cursor: pointer; padding: 4px 8px; border-radius: 4px; line-height: 1; }
  .totale-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0 0; margin-top: 6px; border-top: 1px solid var(--border);
  }
  .totale-label { font-size: 14px; font-weight: 600; }
  .totale-value { font-size: 22px; font-family: 'DM Mono', monospace; font-weight: 500; }
  .empty-storico { font-size: 13px; color: var(--text3); text-align: center; padding: 18px 0; font-style: italic; }
  .close-btn {
    width: 100%; margin-top: 18px; padding: 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 15px;
    font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--text2); cursor: pointer;
  }

  .info-banner {
    background: var(--amber-bg); border: 1px solid #FAC775;
    border-radius: var(--radius); padding: 10px 14px; margin-bottom: 12px;
    font-size: 12px; color: var(--amber); line-height: 1.4;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-title">
      <h1>🛒 Lista della Spesa</h1>
      <p>Piano Matteo — 60gg</p>
    </div>
    <button class="spesa-btn" onclick="openModal()">💰 Spesa</button>
  </div>
  <div class="top-tabs">
    <button class="top-tab active" onclick="setMode('giorno')">Giorno singolo</button>
    <button class="top-tab" onclick="setMode('3giorni')">3 giorni</button>
    <button class="top-tab" onclick="setMode('scorte')">📦 Scorte</button>
  </div>
  <div id="day-selector" class="day-tabs">
    <button class="tab active" onclick="setDay('A')">Giorno A</button>
    <button class="tab" onclick="setDay('B')">Giorno B</button>
    <button class="tab" onclick="setDay('C')">Giorno C</button>
  </div>
</header>

<div class="container" id="main-container"></div>

<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Registra la spesa</h2>
    <p>Inserisci quanto hai speso oggi</p>
    <div class="input-row">
      <div class="euro-input-wrap">
        <span>€</span>
        <input class="euro-input" type="number" id="spesa-input" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
      </div>
      <button class="save-btn" onclick="saveSpesa()">Salva</button>
    </div>
    <div class="storico-title">Storico spese</div>
    <ul class="storico-list" id="storico-list"></ul>
    <div id="totale-wrap" class="totale-row" style="display:none">
      <span class="totale-label">Totale speso</span>
      <span class="totale-value" id="totale-value">€ 0.00</span>
    </div>
    <button class="close-btn" onclick="closeModal()">Chiudi</button>
  </div>
</div>

  ]},
  { title: "🍞 Pane e carboidrati", keys: [
    { key: "gnocchi",           name: "Gnocchi di patate" },
    { key: "pasta_integrale",   name: "Pasta integrale / pasta fresca" },
    { key: "cereali",           name: "Riso / orzo / farro" },
    { key: "pane_panpiuma",     name: "Pane senza crosta (Panpiuma)" },
    { key: "pane_integrale",    name: "Pane fresco integrale / piadina" },
    { key: "pane_segale",       name: "Pane di segale fette (Dailybread)" },
    { key: "avena",             name: "Fiocchi d'avena (Quaker)" },
    { key: "patate",            name: "Patate" },
    { key: "cracker",           name: "Cracker Fior d'acqua (Mulino B.)" },
    { key: "crostini",          name: "Crostini integrali (Granetti)" },
    { key: "biscotti",          name: "Biscotti Plasmon / Orosaiwa" },
    { key: "paninetti",         name: "Paninetti al latte (Nuvolatte)" },
  ]},
  { title: "🫙 Condimenti e salse", keys: [
    { key: "olio_evo",          name: "Olio extravergine di oliva" },
    { key: "olive",             name: "Olive taggiasche denocciolate" },
    { key: "miele",             name: "Miele di fiori" },
    { key: "crema_proteica",    name: "Crema proteica (Gonuts)" },
  ]},
  { title: "🧃 Bevande", keys: [
    { key: "spremuta",          name: "Spremuta / succo frutta s.z.a." },
    { key: "mandorla",          name: "Bevanda alla mandorla (Alpro)" },
  ]},
  { title: "💊 Farmacia / Integratori base", keys: [
    { key: "supradyn",          name: "Supradyn effervescente" },
    { key: "frutta_disidratata",name: "Frutta disidratata al naturale" },
  ]},
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let mode = 'giorno';
let currentDay = 'A';
let scorteView = 'check'; // 'check' | 'mancanti'

let checked   = {A:{}, B:{}, C:{}, '3g':{}};
let stockHave = {};   // groupKey -> true se ce l'ho
let storico   = [];

try { checked   = JSON.parse(localStorage.getItem('spesa_checked3') || '{"A":{},"B":{},"C":{},"3g":{}}'); if (!checked['3g']) checked['3g'] = {}; } catch(e) {}
try { stockHave = JSON.parse(localStorage.getItem('spesa_stock')    || '{}'); } catch(e) {}
try { storico   = JSON.parse(localStorage.getItem('spesa_storico')  || '[]'); } catch(e) {}

function save() {
  localStorage.setItem('spesa_checked3', JSON.stringify(checked));
  localStorage.setItem('spesa_stock',    JSON.stringify(stockHave));
  localStorage.setItem('spesa_storico',  JSON.stringify(storico));
}

// ─── AGGREGAZIONE 3 GIORNI ───────────────────────────────────────────────────
function build3Days() {
  const map = {};
  const order = [];
  ['A','B','C'].forEach(d => {
    days[d].forEach(sec => {
      sec.items.forEach(item => {
        const gk = item.groupKey;
        if (!map[gk]) { map[gk] = { name: item.name, totalQty: 0, unit: item.unit, alts: new Set(), days: [] }; order.push(gk); }
        if (!isNaN(item.qty) && item.unit !== 'qb') map[gk].totalQty += item.qty;
        map[gk].days.push(d);
        if (item.alt) map[gk].alts.add(item.alt);
      });
    });
  });
  const cats = {
    'Frutta e verdura fresca': ['banana','frutto','carote','frutta_disidratata'],
    'Verdure cotte': ['verdure_cotte'],
    'Carne': ['carne_pollo','carne_vitello','bresaola'],
    'Pesce': ['pesce_fresco','tonno'],
    'Latticini e uova': ['yogurt_greco','feta','maionese','uova','albume'],
    'Carboidrati': ['gnocchi','cereali','pasta_integrale','pane_panpiuma','pane_integrale','pane_segale','crostini','cracker','biscotti','paninetti','avena','patate'],
    'Condimenti': ['olio_evo','philadelphia','olive','miele','crema_proteica'],
    'Bevande': ['spremuta','mandorla'],
    'Altro': [],
  };
  const mapped = new Set(Object.values(cats).flat());
  order.forEach(gk => { if (!mapped.has(gk)) cats['Altro'].push(gk); });
  const sections = [];
  Object.entries(cats).forEach(([catName, keys]) => {
    const items = keys.filter(gk => map[gk]).map(gk => ({ gk, ...map[gk] }));
    if (items.length) sections.push({ title: catName, items });
  });
  return sections;
}

function fmtQty(item) {
  if (item.unit === 'qb') return 'q.b.';
  return item.qty + ' ' + item.unit;
}
function fmtTotalQty(entry) {
  if (entry.unit === 'qb') return 'q.b.';
  return entry.totalQty + ' ' + entry.unit;
}

// ─── UI HELPERS ──────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  scorteView = 'check';
  document.querySelectorAll('.top-tab').forEach((t,i) => t.classList.toggle('active', ['giorno','3giorni','scorte'][i] === m));
  document.getElementById('day-selector').style.display = m === 'giorno' ? 'flex' : 'none';
  render();
}

function setDay(d) {
  currentDay = d;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['A','B','C'][i] === d));
  render();
}

function checkKey(si, ii) {
  return mode === '3giorni' ? ('3g_' + si + '_' + ii) : (currentDay + '_' + si + '_' + ii);
}

function toggleItem(si, ii) {
  const k = checkKey(si, ii);
  const bucket = mode === '3giorni' ? '3g' : currentDay;
  checked[bucket][k] = !checked[bucket][k];
  save(); render();
}

function resetCurrent() {
  if (mode === 'scorte') {
    if (!confirm('Azzerare tutte le scorte?')) return;
    stockHave = {}; save(); render(); return;
  }
  const label = mode === '3giorni' ? 'lista 3 giorni' : 'Giorno ' + currentDay;
  if (!confirm('Azzerare le spunte della ' + label + '?')) return;
  if (mode === '3giorni') checked['3g'] = {};
  else checked[currentDay] = {};
  save(); render();
}

function toggleStock(key) {
  stockHave[key] = !stockHave[key];
  save(); render();
}

function showMancanti() { scorteView = 'mancanti'; render(); }
function showScorteCheck() { scorteView = 'check'; render(); }

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const c = document.getElementById('main-container');

  if (mode === 'scorte') {
    renderScorte(c); return;
  }

  let sections, bucketKey;
  if (mode === 'giorno') {
    sections = days[currentDay].map(sec => ({
      title: sec.title,
      items: sec.items.map(item => ({
        displayName: item.name, displayQty: fmtQty(item),
        alt: item.alt || null, isMulti: false,
      }))
    }));
    bucketKey = currentDay;
  } else {
    const raw = build3Days();
    sections = raw.map(sec => ({
      title: sec.title,
      items: sec.items.map(entry => ({
        displayName: entry.name, displayQty: fmtTotalQty(entry),
        alt: entry.alts.size ? [...entry.alts].join(' / ') : null,
        isMulti: new Set(entry.days).size > 1,
        dayLabels: [...new Set(entry.days)].join('+'),
      }))
    }));
    bucketKey = '3g';
  }

  let total = 0, done = 0, html = '';
  if (mode === '3giorni') html += '<div class="info-banner">Quantità totali per A+B+C. Le cifre in arancione coprono più giorni.</div>';

  html += '<div class="progress-card"><div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div><span class="progress-label" id="prog-text">0 / 0</span><button class="reset-link" onclick="resetCurrent()">Azzera</button></div>';

  sections.forEach((sec, si) => {
    const sd = sec.items.filter((_,ii) => checked[bucketKey][checkKey(si,ii)]).length;
    html += '<div class="section"><div class="section-header"><span class="section-title">' + sec.title + '</span><span class="section-count">' + sd + '/' + sec.items.length + '</span></div>';
    sec.items.forEach((item, ii) => {
      const k = checkKey(si, ii);
      const isDone = !!checked[bucketKey][k];
      total++; if (isDone) done++;
      html += '<div class="item-row" onclick="toggleItem(' + si + ',' + ii + ')">';
      html += '<div class="check' + (isDone?' done':'') + '"><div class="checkmark"></div></div>';
      html += '<div class="item-content">';
      html += '<div class="item-name' + (isDone?' done':'') + '">' + item.displayName + '</div>';
      if (item.alt) html += '<div class="item-alt">' + item.alt + '</div>';
      if (mode === '3giorni' && item.isMulti) html += '<div class="days-badge">giorno ' + item.dayLabels + '</div>';
      html += '</div>';
      html += '<span class="qty' + (item.isMulti?' multi':'') + '">' + item.displayQty + '</span>';
      html += '</div>';
    });
    html += '</div>';
  });

  c.innerHTML = html;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = done + ' / ' + total;
}

function renderScorte(c) {
  if (scorteView === 'mancanti') { renderMancanti(c); return; }

  const haveCount = Object.values(stockHave).filter(Boolean).length;
  const total = SCORTE_CATS.reduce((a, cat) => a + cat.keys.length, 0);
  const missing = total - haveCount;

  let html = '';

  html += '<div class="progress-card"><div class="progress-track"><div class="progress-fill amber" id="prog-fill" style="width:' + Math.round(haveCount/total*100) + '%"></div></div><span class="progress-label" id="prog-text">' + haveCount + ' / ' + total + ' in casa</span><button class="reset-link" onclick="resetCurrent()">Azzera</button></div>';

  html += '<div class="scorte-legend"><span><span class="legend-dot dot-amber"></span>Ho già</span><span><span class="legend-dot" style="background:var(--border2)"></span>Da comprare</span></div>';

  html += '<div class="scorte-actions">';
  html += '<button class="action-btn" onclick="toggleAllStock()">Seleziona tutto</button>';
  html += '<button class="action-btn primary" onclick="showMancanti()">🛒 Vedi lista mancanti (' + missing + ')</button>';
  html += '</div>';

  SCORTE_CATS.forEach(cat => {
    html += '<div class="section"><div class="section-header"><span class="section-title">' + cat.title + '</span><span class="section-count">' + cat.keys.filter(k => stockHave[k.key]).length + '/' + cat.keys.length + '</span></div>';
    cat.keys.forEach(k => {
      const have = !!stockHave[k.key];
      html += '<div class="item-row' + (have?' has-stock':'') + '" onclick="toggleStock(\'' + k.key + '\')">';
      html += '<div class="check' + (have?' stock':'') + '"><div class="checkmark"></div></div>';
      html += '<div class="item-content"><div class="item-name">' + k.name + '</div></div>';
      if (have) html += '<span class="qty" style="background:var(--amber-bg);color:var(--amber)">✓ Ho già</span>';
      html += '</div>';
    });
    html += '</div>';
  });

  c.innerHTML = html;
}

function renderMancanti(c) {
  const missing = [];
  SCORTE_CATS.forEach(cat => {
    const items = cat.keys.filter(k => !stockHave[k.key]);
    if (items.length) missing.push({ title: cat.title, items });
  });

  let html = '';
  html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px">';
  html += '<div><div style="font-size:16px;font-weight:600">Lista mancanti</div><div style="font-size:12px;color:var(--text3);margin-top:2px">Cose da comprare</div></div>';
  html += '<button class="back-btn" onclick="showScorteCheck()">← Scorte</button>';
  html += '</div>';

  if (!missing.length || missing.every(m => !m.items.length)) {
    html += '<div class="empty-state"><div class="big">🎉</div>Hai tutto in casa!<br>Nessun prodotto mancante.</div>';
    c.innerHTML = html; return;
  }

  // Progress spunta lista mancanti
  const allMissing = missing.flatMap(m => m.items);
  const total = allMissing.length;
  const done = allMissing.filter(k => checked['mancanti_' + k.key]).length;

  html += '<div class="progress-card"><div class="progress-track"><div class="progress-fill" style="width:' + Math.round(done/total*100) + '%"></div></div><span class="progress-label">' + done + ' / ' + total + '</span><button class="reset-link" onclick="resetMancanti()">Azzera</button></div>';

  missing.forEach(cat => {
    html += '<div class="section"><div class="section-header"><span class="section-title">' + cat.title + '</span><span class="section-count">' + cat.items.length + '</span></div>';
    cat.items.forEach(k => {
      const isDone = !!checked['mancanti_' + k.key];
      html += '<div class="item-row" onclick="toggleMancante(\'' + k.key + '\')">';
      html += '<div class="check' + (isDone?' done':'') + '"><div class="checkmark"></div></div>';
      html += '<div class="item-content"><div class="item-name' + (isDone?' done':'') + '">' + k.name + '</div></div>';
      if (isDone) html += '<span class="qty" style="background:var(--green-bg);color:var(--green-text)">✓</span>';
      html += '</div>';
    });
    html += '</div>';
  });

  c.innerHTML = html;
}

function toggleMancante(key) {
  const k = 'mancanti_' + key;
  checked[k] = !checked[k];
  // Se spunto come comprato, aggiorno anche le scorte
  if (checked[k]) stockHave[key] = true;
  save(); renderMancanti(document.getElementById('main-container'));
}

function resetMancanti() {
  const allMissing = SCORTE_CATS.flatMap(cat => cat.keys.filter(k => !stockHave[k.key]));
  allMissing.forEach(k => { delete checked['mancanti_' + k.key]; });
  save(); renderMancanti(document.getElementById('main-container'));
}

let allSelected = false;
function toggleAllStock() {
  const allKeys = SCORTE_CATS.flatMap(cat => cat.keys.map(k => k.key));
  allSelected = !allSelected;
  allKeys.forEach(k => { stockHave[k] = allSelected; });
  save(); render();
}

// ─── MODAL SPESA ─────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('spesa-input').value = '';
  renderStorico();
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal')) closeModal(); }

function saveSpesa() {
  const val = parseFloat(document.getElementById('spesa-input').value);
  if (!val || val <= 0) { alert('Inserisci un importo valido'); return; }
  const dateStr = new Date().toLocaleDateString('it-IT', {day:'2-digit',month:'2-digit',year:'numeric'});
  const label = mode === '3giorni' ? 'A+B+C' : mode === 'scorte' ? 'Scorte' : 'Giorno ' + currentDay;
  storico.unshift({ day: label, date: dateStr, amount: val });
  save();
  document.getElementById('spesa-input').value = '';
  renderStorico();
}
function deleteSpesa(i) { storico.splice(i,1); save(); renderStorico(); }

function renderStorico() {
  const list = document.getElementById('storico-list');
  const totWrap = document.getElementById('totale-wrap');
  if (!storico.length) {
    list.innerHTML = '<li class="empty-storico">Nessuna spesa registrata</li>';
    totWrap.style.display = 'none'; return;
  }
  list.innerHTML = storico.map((s,i) =>
    '<li class="storico-item">' +
      '<div class="storico-meta"><span class="storico-day">' + s.day + '</span><span class="storico-date">' + s.date + '</span></div>' +
      '<span class="storico-amount">€ ' + s.amount.toFixed(2) + '</span>' +
      '<button class="storico-del" onclick="deleteSpesa(' + i + ')">×</button>' +
    '</li>'
  ).join('');
  const tot = storico.reduce((a,s) => a+s.amount, 0);
  document.getElementById('totale-value').textContent = '€ ' + tot.toFixed(2);
  totWrap.style.display = 'flex';
}

render();
</script>
